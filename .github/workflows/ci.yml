name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    name: PHPUnit, Symfony and syntax checks
    runs-on: ubuntu-latest

    env:
      APP_ENV: test
      APP_DEBUG: 1
      APP_SECRET: ci_dummy_secret
      DEFAULT_URI: http://127.0.0.1:8092
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: kurs_ci
      DB_USER: ci
      DB_PASSWORD: ci
      TENTARY_WEBHOOK_SECRET: ci_dummy_webhook_secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, curl, iconv, pdo
          coverage: none

      - name: Validate Composer files
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Check PHP syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            php -l "$file" >/dev/null
          done < <(find bin config public src -name '*.php' -type f | sort)

      - name: Lint Symfony container
        run: php bin/console lint:container --env=test

      - name: Run PHPUnit
        run: vendor/bin/phpunit

      - name: Check local Markdown links
        shell: python
        run: |
          from pathlib import Path
          import re
          import sys

          failures = []
          pattern = re.compile(r'!?\[[^\]]*\]\(([^)]+)\)')
          skipped = {'.git', 'vendor', 'node_modules', 'var'}

          for path in Path('.').rglob('*.md'):
              if any(part in skipped for part in path.parts):
                  continue
              text = path.read_text(encoding='utf-8', errors='ignore')
              for match in pattern.finditer(text):
                  target = match.group(1).strip()
                  if not target or target.startswith(('http://', 'https://', 'mailto:', '#')):
                      continue
                  clean = target.split('#', 1)[0]
                  if not clean:
                      continue
                  if not (path.parent / clean).exists():
                      failures.append(f'{path}: missing local link target {target}')

          if failures:
              print('\n'.join(failures))
              sys.exit(1)

      - name: Check environment file policy
        shell: python
        run: |
          from pathlib import Path
          import sys

          allowed = {'.env.example'}
          forbidden = []

          for path in Path('.').rglob('.env*'):
              if '.git' in path.parts or 'vendor' in path.parts:
                  continue
              if path.name not in allowed:
                  forbidden.append(str(path))

          if forbidden:
              print('Real environment files must not be committed:')
              print('\n'.join(forbidden))
              sys.exit(1)

      - name: Check for obvious leaked token patterns
        shell: python
        run: |
          from pathlib import Path
          import re
          import sys

          patterns = [
              re.compile(r'github_pat_[A-Za-z0-9_]+'),
              re.compile(r'ghp_[A-Za-z0-9_]+'),
              re.compile(r'sk-[A-Za-z0-9]{20,}'),
              re.compile(r'xox[baprs]-[A-Za-z0-9-]{20,}'),
          ]
          suffixes = {'.md', '.php', '.yml', '.yaml', '.env', '.txt', '.json', '.js', '.css'}
          failures = []

          for path in Path('.').rglob('*'):
              if '.git' in path.parts or 'vendor' in path.parts or '.github' in path.parts:
                  continue
              if path.is_dir() or path.name == '.env.example':
                  continue
              if path.suffix.lower() not in suffixes:
                  continue
              text = path.read_text(encoding='utf-8', errors='ignore')
              for pattern in patterns:
                  if pattern.search(text):
                      failures.append(f'{path}: possible leaked token pattern found')

          if failures:
              print('\n'.join(failures))
              sys.exit(1)
